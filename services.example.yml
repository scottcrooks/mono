services:
    - name: polaris
      path: packages/polaris
      description: Shared Go kernel library
      kind: package
      archetype: go

    - name: pythia
      path: apps/pythia
      description: Go backend API
      kind: service
      archetype: go
      dev: go run github.com/air-verse/air@latest -c .air.toml
      depends: [postgres]

    - name: mallos
      path: apps/mallos
      description: React frontend
      kind: service
      archetype: react
      dev: pnpm dev

    - name: daedalus
      path: apps/daedalus
      description: React admin frontend
      kind: service
      archetype: react
      dev: pnpm dev

local:
    namespace: argus-local
    resources:
        - name: postgres
          description: PostgreSQL 17 database for local development
          manifest: infra/local/postgres.yaml
          readyCheck:
              selector: app=postgres
          portForward:
              localPort: 5432
              targetPort: 5432
              target: svc/postgres
